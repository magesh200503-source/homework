<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Flexbox</title>
</head>

<body>
    <div class="header flex-header">
        <article class="article flex-img">
            <img src="cat-image.jpg" 
            alt="cat-icon"
            width="60px"
            height="60px">
        </article>
        <article class="article flex-main">
            <a href="#" class="header-link">Главная</a>
            <a href="#" class="header-link">О компании</a>
            <a href="#" class="header-link">Цены</a>
        </article>
        <article class="article flex-number">
            <p>+7 999 999 99 99</p>
        </article>

    </div>
</body>
</html>
